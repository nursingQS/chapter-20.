<script>

    const questions = [
        { //1
            id: 1,
            question: "A nurse is caring for a 21-year-old client whose medical history includes an alpha1-antitrypsin deficiency. This client has an increased risk of which health problem?",

                "A. Pulmonary edema",
                "B. Panacinar emphysema",
                "C. Cystic fibrosis (CF)",
                "D. Empyema"

            rationale: "Alpha1-antitrypsin deficiency predisposes young adults to rapid development of panacinar lobular emphysema, even without smoking. It does not increase risk of pulmonary edema, CF, or empyema. (PTS:1 REF:p.607)"

        { //2

                "C. A barrel chest",
                "D. Long, thin fingers"

            rationale: "Chronic hyperinflation in COPD (emphysematous type) leads to barrel chest. Moon face is from steroids; oxygen toxicity unlikely; clubbing (not long thin fingers) may occur. (PTS:1 REF:p.606)"
        },
        { //3
            id: 3,
            question: "The nurse is providing care for a client who has recently been diagnosed with chronic obstructive pulmonary disease. When educating the client about exacerbations, the nurse should prioritize which topic?",
            options: [

                "D. The relationship between activity level and exacerbations"
            ],
            correct: 0, // A
            rationale: "Prevention is key: client must identify factors that cause exacerbations. Corticosteroids not 'rescue'; prone does not help; activity impact is secondary to prevention. (PTS:1 REF:p.616)"
        },
        { //4
            id: 4,
            question: "A school nurse is caring for a 10-year-old client who is having an asthma attack. What is the preferred intervention to alleviate this client's airflow obstruction?",

                "C. Administer an inhaled beta-adrenergic agonist.",
                "D. Use a peak flow monitoring device."
            ],
            correct: 2, // C
            rationale: "Quick-acting beta-adrenergic agonists are first for prompt relief of airflow obstruction. Steroids are not first-line rescue; peak flow monitors assess, not treat. (PTS:1 REF:p.635)"
        },
        { //5
            id: 5,
            question: "A nurse is developing a teaching plan for an adult client with asthma. Which teaching point should have the highest priority in the plan of care that the nurse is developing?",

            rationale: "Taking prescribed medications on time is the most important measure in preventing asthma attacks. Others are helpful but lower priority. (PTS:1 REF:p.640)"

        { //6
            id: 6,
            question: "A nurse is preparing to care for a client with bronchiectasis. The nurse should recognize that this client is likely to experience respiratory difficulties related to what pathophysiologic process?",

                "D. Excessive gas exchange in the bronchioles"

            correct: 2, // C
            rationale: "Bronchiectasis is chronic irreversible dilation of bronchi and bronchioles from destruction of muscles/elastic tissue. Not acute bronchospasm, alveolar distention, or excessive gas exchange. (PTS:1 REF:p.631)"
        },
        { //7
            id: 7,
            question: "A nurse is caring for a 6-year-old client with cystic fibrosis. To enhance the child's nutritional status, which priority intervention should be included in the plan of care?",

                "C. Total parenteral nutrition (TPN)",
                "D. Magnesium, thiamine, and iron supplementation"
            ],
            correct: 0, // A
            rationale: "Nearly 90% of CF patients have pancreatic exocrine insufficiency and require oral pancreatic enzymes with meals. Small meals or TPN not typical; vitamin supplements needed but not those specific minerals as priority. (PTS:1 REF:p.645)"

        { //8
            id: 8,

                "D. Pulmonary function testing"

            correct: 2, // C
            rationale: "Postural drainage is part of all treatment plans for bronchiectasis to reduce secretions and infection. Diuretics/IV fluids not helpful; PFT may be done but does not relieve symptoms. (PTS:1 REF:p.632)"
        },
        { //9
            id: 9,
            question: "A nurse is completing a focused respiratory assessment of a child with asthma. What assessment finding is most closely associated with the characteristic signs and symptoms of asthma?",

            rationale: "Common asthma symptoms: cough, dyspnea, wheezing. Wheezing is hallmark. Bradypnea and increased AP diameter not typical in acute asthma. (PTS:1 REF:p.633)"

        { //10
            id: 10,
            question: "A nurse is developing the teaching portion of a care plan for a client with COPD. What would be the most important component for the nurse to emphasize?",

                "D. Setting realistic short- and long-term goals"
            ],
            correct: 3, // D
            rationale: "Major teaching: setting and accepting realistic short/long-term goals. Emphysema is not curable; prophylactic antibiotics not used; no need to avoid public places generally. (PTS:1 REF:p.608)"

        { //12
            id: 12,
            question: "A nurse is performing a focused assessment on a client with bronchiectasis. Which are the most prevalent signs and symptoms of this condition? Select all that apply.",

            rationale: "Bronchiectasis hallmark: chronic cough, copious purulent sputum, clubbing. Radiating chest pain not typical; wheezes more asthma; AP diameter in COPD. (PTS:1 REF:p.631)"

        { //14
            id: 14,
            question: "A nurse has been asked to give a workshop on chronic obstructive pulmonary disease for a local community group. The nurse emphasizes the importance of smoking cessation because smoking has which pathophysiologic effect?",

        },
        { //15
            id: 15,
            question: "A pediatric nurse practitioner is caring for a 2-year-old client who has just been diagnosed with asthma. The nurse has provided the parents with information that includes potential causative agents for an asthmatic reaction. Which potential causative agent that may trigger an attack should the nurse describe?",

        },
        { //16
            id: 16,
            question: "A nurse is providing discharge teaching for a client with COPD. What should the nurse teach the client about breathing exercises?",

            id: 17,
            question: "A nurse is caring for a client who has been admitted with an exacerbation of chronic bronchiectasis. The nurse should expect to assess the client for which clinical manifestation?",

            id: 18,

    // --- same logic as template (navigation, selection, keyboard) ---
    let currentQuestion = 0;
    let selectedOption = null;
    let answers = Array(questions.length).fill(null);

    function loadQuestion() {
        const q = questions[currentQuestion];
        if (!q) return;

        const progress = ((currentQuestion + 1) / questions.length) * 100;
        document.getElementById('progressBar').style.width = `${progress}%`;
        document.getElementById('counter').textContent = `${currentQuestion + 1}/${questions.length}`;
        document.getElementById('questionNumber').textContent = q.id;

        document.getElementById('question').innerHTML = q.question;
        loadOptions(q);

        document.getElementById('feedback').style.display = 'none';
        document.getElementById('rationale').classList.remove('show');
        document.getElementById('cancelBtn').classList.remove('show');

        document.getElementById('prevBtn').disabled = currentQuestion === 0;
        const stored = answers[currentQuestion];
        document.getElementById('nextBtn').disabled = stored === null || stored === undefined;
        document.getElementById('nextBtn').textContent = currentQuestion >= questions.length - 1 ? 'FINISH ➡️' : 'NEXT ➡️';
    }

    function loadOptions(q) {
        const container = document.getElementById('options');
        container.innerHTML = '';
        q.options.forEach((opt, idx) => {
            const div = document.createElement('div');
            div.className = 'option';
            div.innerHTML = `<div class="option-letter">${String.fromCharCode(65 + idx)}</div><div>${opt}</div>`;
            div.onclick = () => selectOption(idx);
            container.appendChild(div);
        });

        const saved = answers[currentQuestion];
        if (saved !== null && saved !== undefined) {
            selectOption(saved, true);
        }
    }

    function selectOption(index, fromMemory = false) {
        const q = questions[currentQuestion];
        if (!fromMemory && selectedOption !== null) return;

        if (!fromMemory) {
            selectedOption = index;
            answers[currentQuestion] = index;
        }

        highlightSelected(index, q);
        showFeedback(index, q);
        document.getElementById('nextBtn').disabled = false;
        document.getElementById('cancelBtn').classList.add('show');
    }

    function highlightSelected(index, q) {
        const opts = document.querySelectorAll('.option');
        opts.forEach((opt, i) => opt.classList.remove('correct', 'incorrect'));

        const correctIndices = Array.isArray(q.correct) ? q.correct : [q.correct];
        if (Array.isArray(q.correct)) {
            correctIndices.forEach(ci => opts[ci]?.classList.add('correct'));
            if (!correctIndices.includes(index)) {
                opts[index]?.classList.add('incorrect');
            }
        } else {
            if (index === q.correct) {
                opts[index].classList.add('correct');
            } else {
                opts[index].classList.add('incorrect');
                opts[q.correct].classList.add('correct');
            }
        }
    }

    function showFeedback(index, q) {
        const fb = document.getElementById('feedback');
        const icon = document.getElementById('feedbackIcon');
        const text = document.getElementById('feedbackText');
        const rationaleDiv = document.getElementById('rationale');
        const rationaleP = document.getElementById('rationaleText');

        const correctIndices = Array.isArray(q.correct) ? q.correct : [q.correct];
        const isCorrect = correctIndices.includes(index);

        if (isCorrect) {
            fb.className = 'feedback correct';
            icon.textContent = '✅';
            text.textContent = 'CORRECT!';
        } else {
            fb.className = 'feedback incorrect';
            icon.textContent = '❌';
            const letters = correctIndices.map(c => String.fromCharCode(65 + c)).join(', ');
            text.textContent = `INCORRECT. Correct answer(s): ${letters}`;
        }

        fb.style.display = 'flex';
        rationaleP.innerHTML = q.rationale;
        rationaleDiv.classList.add('show');
    }

    function cancelSelection() {
        const q = questions[currentQuestion];
        selectedOption = null;
        answers[currentQuestion] = null;
        document.querySelectorAll('.option').forEach(opt => opt.classList.remove('correct', 'incorrect'));
        document.getElementById('feedback').style.display = 'none';
        document.getElementById('rationale').classList.remove('show');
        document.getElementById('cancelBtn').classList.remove('show');
        document.getElementById('nextBtn').disabled = true;
    }

    function nextCard() {
        if (currentQuestion < questions.length - 1) {
            currentQuestion++;
            selectedOption = null;
            loadQuestion();
        } else {
            currentQuestion = 0;
            loadQuestion();
        }
    }

    function previousCard() {
        if (currentQuestion > 0) {
            currentQuestion--;
            const q = questions[currentQuestion];
            selectedOption = answers[currentQuestion];
            loadQuestion();
        }
    }

    document.addEventListener('keydown', function(e) {
        if (e.key >= '1' && e.key <= '4') selectOption(parseInt(e.key)-1);
        else if (e.key >= 'a' && e.key <= 'd') selectOption(e.key.charCodeAt(0)-97);
        else if (e.key >= 'A' && e.key <= 'D') selectOption(e.key.charCodeAt(0)-65);
        else if (e.key === 'ArrowLeft' && !document.getElementById('prevBtn').disabled) previousCard();
        else if (e.key === 'ArrowRight' && !document.getElementById('nextBtn').disabled) nextCard();
        else if (e.key === 'Escape' && document.getElementById('cancelBtn').classList.contains('show')) cancelSelection();
    });

    loadQuestion();
</script>
